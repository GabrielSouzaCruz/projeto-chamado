{% extends 'base.html' %}
{% block title %}Meu Perfil{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-user me-2"></i>Meu Perfil</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Nome de Usuário</label>
                            <input type="text" value="{{ user.username }}" class="form-control bg-light" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">E-mail</label>
                            <input type="email" name="email" class="form-control" value="{{ form.email.value|default_if_none:'' }}" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Nome</label>
                            <input type="text" name="first_name" class="form-control" value="{{ form.first_name.value|default_if_none:'' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Sobrenome</label>
                            <input type="text" name="last_name" class="form-control" value="{{ form.last_name.value|default_if_none:'' }}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Departamento</label>
                            <input type="text" name="departamento" class="form-control" value="{{ form.departamento.value|default_if_none:'' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telefone</label>
                            <input type="text" name="telefone" class="form-control" value="{{ form.telefone.value|default_if_none:'' }}">
                        </div>
                    </div>
                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-1"></i> Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mt-4 shadow-sm border-0 bg-light">
            <div class="card-body">
                <div class="row text-center">
                    <div class="col-md-4">
                        <h2 class="text-primary fw-bold">{{ stats.total|default:0 }}</h2>
                        <span class="text-muted">Total de Chamados</span>
                    </div>
                    <div class="col-md-4">
                        <h2 class="text-success fw-bold">{{ stats.resolvidos|default:0 }}</h2>
                        <span class="text-muted">Resolvidos</span>
                    </div>
                    <div class="col-md-4">
                        <h2 class="text-warning fw-bold">{{ stats.abertos|default:0 }}</h2>
                        <span class="text-muted">Em Aberto</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
